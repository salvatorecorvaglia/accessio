name: Publish to npmjs

on:
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'Which tag or branch to publish? (e.g. v1.0.0)'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.publish_tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  publish-npm:
    name: Publish unscoped to npmjs
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.publish_tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
